<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<meta name="theme-color" content="#0C2E54">
<title>Hogar+</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-192.png">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,Helvetica,Arial,sans-serif;background:#EAF2FB;color:#0C2E54;overflow-x:hidden}
input,select,textarea,button{font-family:inherit;font-size:16px}
button{cursor:pointer;background:none;border:none;color:inherit}
input,select,textarea{background:white;border:1px solid #C9DDF2;border-radius:8px;padding:10px 12px;color:#0C2E54;width:100%;outline:none}
input:focus,select:focus,textarea:focus{border-color:#378ADD}
.hidden{display:none!important}

/* SPLASH */
#splash{position:fixed;inset:0;background:#0C2E54;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;padding:24px;text-align:center;transition:opacity 0.4s}
#splash.fade{opacity:0;pointer-events:none}
#splash svg{width:200px;height:auto;margin-bottom:20px;animation:logoIn 0.8s ease-out}
#splash h1{color:#EAF2FB;font-size:32px;font-weight:500;letter-spacing:-0.5px;margin-bottom:6px;animation:fadeIn 0.8s 0.2s both}
#splash h1 .plus{color:#378ADD}
#splash .iniciales{color:#85B7EB;font-size:11px;letter-spacing:2px;margin-bottom:40px;animation:fadeIn 0.8s 0.3s both}
#splash .frase{color:#EAF2FB;font-size:15px;line-height:1.6;max-width:300px;font-style:italic;animation:fadeIn 0.8s 0.5s both;opacity:0.95}
#splash .frase::before,#splash .frase::after{content:'"';color:#378ADD;font-size:20px}
@keyframes logoIn{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

/* LOGIN */
#login{position:fixed;inset:0;background:#EAF2FB;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:900;padding:24px}
#login .titulo{color:#0C2E54;font-size:22px;font-weight:500;margin-bottom:6px}
#login .subtitulo{color:#1E4A7A;font-size:13px;margin-bottom:32px}
.usuarios{display:flex;gap:16px;margin-bottom:32px}
.usuario-card{background:white;border:2px solid #C9DDF2;border-radius:16px;padding:20px 24px;display:flex;flex-direction:column;align-items:center;gap:8px;min-width:120px;transition:all 0.2s}
.usuario-card.activo{border-color:#0C2E54;background:#DCEAF8}
.usuario-card .avatar{width:56px;height:56px;border-radius:50%;background:#0C2E54;color:white;display:flex;align-items:center;justify-content:center;font-size:22px;font-weight:500}
.usuario-card.activo .avatar{background:#378ADD}
.usuario-card .nombre{font-size:14px;color:#0C2E54;font-weight:500}
.pin-display{display:flex;gap:12px;margin-bottom:24px}
.pin-dot{width:16px;height:16px;border-radius:50%;background:white;border:1.5px solid #C9DDF2}
.pin-dot.lleno{background:#0C2E54;border-color:#0C2E54}
.pin-pad{display:grid;grid-template-columns:repeat(3,68px);gap:14px}
.pin-key{width:68px;height:68px;border-radius:50%;background:white;border:1px solid #C9DDF2;color:#0C2E54;font-size:22px;font-weight:500;display:flex;align-items:center;justify-content:center;transition:transform 0.1s}
.pin-key:active{transform:scale(0.92);background:#DCEAF8}
.pin-key.borrar{background:transparent;border-color:transparent;font-size:14px;color:#1E4A7A}
.pin-error{color:#A32D2D;font-size:13px;margin-top:14px;height:18px}

/* APP PRINCIPAL */
#app{min-height:100vh;padding:16px 14px 90px;display:none;max-width:480px;margin:0 auto}
#app.visible{display:block}
.header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.header-left p:first-child{font-size:11px;color:#1E4A7A;letter-spacing:0.5px}
.header-left h2{font-size:18px;color:#0C2E54;font-weight:500;margin-top:2px}
.header-right{display:flex;align-items:center;gap:8px}
.user-chip{background:white;border:1px solid #C9DDF2;color:#1E4A7A;font-size:11px;padding:6px 10px;border-radius:999px;display:flex;align-items:center;gap:6px}
.user-chip .dot{width:8px;height:8px;border-radius:50%;background:#378ADD}
.mes-btn{background:#0C2E54;color:white;font-size:11px;padding:7px 12px;border-radius:999px;display:flex;align-items:center;gap:4px}
.mes-selector{background:white;border-radius:12px;border:1px solid #C9DDF2;padding:8px;margin-bottom:14px;overflow-x:auto;display:flex;gap:4px}
.mes-chip{font-size:11px;padding:6px 10px;border-radius:999px;color:#5A8AC0;white-space:nowrap;flex-shrink:0;font-weight:500}
.mes-chip.activo{background:#0C2E54;color:white}
.mes-chip.acumulado{background:#DCEAF8;color:#0C2E54}
.mes-chip.acumulado.activo{background:#0C2E54;color:white}

/* CARDS */
.card{background:white;border-radius:14px;padding:14px;border:1px solid #C9DDF2;margin-bottom:12px}
.card-titulo{font-size:11px;color:#1E4A7A;letter-spacing:0.4px;margin-bottom:6px;font-weight:500}
.card-numero{font-size:26px;font-weight:500;color:#0C2E54;margin-bottom:8px}
.card-numero.negativo{color:#A32D2D}
.mini-cards{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.mini-card{background:#DCEAF8;padding:8px 10px;border-radius:8px}
.mini-card p:first-child{font-size:10px;color:#1E4A7A}
.mini-card p:last-child{font-size:13px;font-weight:500;color:#0C2E54;margin-top:2px}
.mini-card.extra{background:#FAEEDA;border-left:3px solid #BA7517}
.mini-card.extra p:first-child{color:#854F0B}
.mini-card.extra p:last-child{color:#412402}
.mini-card.gastado{background:#FAECE7;border-left:3px solid #D85A30}
.mini-card.gastado p:first-child{color:#712B13}
.mini-card.gastado p:last-child{color:#4A1B0C}
.btn-dashed{width:100%;background:transparent;border:1px dashed #5A8AC0;color:#1E4A7A;padding:8px;border-radius:8px;font-size:12px;margin-top:6px}
.btn-primary{background:#0C2E54;color:white;border:none;padding:12px;border-radius:8px;font-size:14px;font-weight:500;width:100%}
.btn-secondary{background:#DCEAF8;color:#0C2E54;border:none;padding:8px 14px;border-radius:999px;font-size:11px;font-weight:500}
.btn-add-row{width:100%;background:transparent;border:none;color:#1E4A7A;font-size:13px;padding:10px}

/* TABLAS */
.tabla{background:white;border-radius:14px;border:1px solid #C9DDF2;overflow:hidden;margin-bottom:12px}
.tabla-header{padding:10px 12px;background:#DCEAF8;font-size:10px;color:#1E4A7A;letter-spacing:0.4px;font-weight:500;display:flex;justify-content:space-between;align-items:center}
.tabla-row{padding:12px;border-top:1px solid #EAF2FB;display:grid;gap:8px;align-items:center}
.tabla-row.gasto{grid-template-columns:28px 1fr auto}
.tabla-row.ahorro{grid-template-columns:1fr 1fr 1fr}
.tabla-row.producto{grid-template-columns:1fr auto}
.tabla-row .check{width:20px;height:20px;border-radius:5px;border:1.5px solid #5A8AC0;display:flex;align-items:center;justify-content:center;font-size:12px;color:white;flex-shrink:0;cursor:pointer}
.tabla-row .check.pagado{background:#0C2E54;border-color:#0C2E54}
.tabla-row .concepto{font-size:14px;color:#0C2E54}
.tabla-row .concepto.pendiente{color:#0C2E54}
.tabla-row .valor{font-size:14px;font-weight:500;color:#0C2E54;text-align:right;white-space:nowrap}
.tabla-row .valor.pendiente{color:#5A8AC0}
.tabla-row .valor.retiro{color:#A32D2D}
.cat-pill{display:inline-block;margin-top:4px;font-size:10px;padding:2px 8px;border-radius:999px;border-left:3px solid currentColor;cursor:pointer}
.dia-header{padding:8px 12px;background:#F4F8FC;border-top:1px solid #EAF2FB;display:flex;justify-content:space-between;font-size:11px;font-weight:500}
.dia-header span:first-child{color:#1E4A7A}
.dia-header span:last-child{color:#0C2E54}
.tabla-footer{padding:10px 12px;background:#F4F8FC;border-top:1px solid #EAF2FB}
.empty-row{padding:24px 12px;text-align:center;color:#5A8AC0;font-size:13px;font-style:italic}

/* CATEGORIAS */
.cats-row{display:flex;flex-wrap:wrap;gap:6px}
.cat-chip{font-size:11px;padding:5px 10px;border-radius:999px;display:inline-flex;align-items:center;gap:6px;cursor:pointer}
.cat-chip .punto{width:8px;height:8px;border-radius:50%;flex-shrink:0}

/* DASHBOARD */
.dona-wrap{display:flex;justify-content:center;margin:8px 0 14px}
.leyenda{display:flex;flex-direction:column;gap:6px}
.leyenda-row{display:flex;justify-content:space-between;font-size:12px;align-items:center}
.leyenda-cat{display:inline-flex;align-items:center;gap:6px}
.leyenda-cat .cuadro{width:10px;height:10px;border-radius:2px}
.leyenda-row .monto{color:#1E4A7A}

/* GRAFICA ANUAL */
.barras-anuales{display:grid;grid-template-columns:repeat(12,1fr);gap:3px;height:130px;align-items:end;padding:10px 0}
.barra-mes{position:relative;height:100%;display:flex;flex-direction:column;justify-content:end}
.barra-mes .barra{background:#B5D4F4;border-radius:3px 3px 0 0;width:100%;min-height:2px;transition:height 0.4s ease-out}
.barra-mes.actual .barra{background:#0C2E54}
.barra-mes.pasado .barra{background:#378ADD}
.barra-mes .label{font-size:9px;color:#5A8AC0;text-align:center;margin-top:4px}
.barra-mes.actual .label{color:#0C2E54;font-weight:500}

/* TABS */
.tabs{display:flex;gap:4px;background:white;padding:4px;border-radius:999px;border:1px solid #C9DDF2;margin-bottom:14px}
.tab{flex:1;text-align:center;font-size:12px;padding:8px 10px;border-radius:999px;color:#1E4A7A;font-weight:500;transition:all 0.2s;cursor:pointer}
.tab.activo{background:#0C2E54;color:white}

/* NAV INFERIOR */
.bottom-nav{position:fixed;bottom:0;left:0;right:0;background:white;border-top:1px solid #C9DDF2;padding:8px 0 calc(8px + env(safe-area-inset-bottom));display:flex;justify-content:space-around;z-index:50;max-width:480px;margin:0 auto}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px;color:#5A8AC0;font-size:10px;font-weight:500;cursor:pointer}
.nav-item.activo{color:#0C2E54}
.nav-item .icon{width:22px;height:22px;border-radius:5px;background:#DCEAF8;display:flex;align-items:center;justify-content:center}
.nav-item.activo .icon{background:#0C2E54}
.nav-item.activo .icon svg{stroke:white}
.nav-item .icon svg{width:14px;height:14px;stroke:#1E4A7A;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(12,46,84,0.55);display:flex;align-items:center;justify-content:center;z-index:200;padding:18px;opacity:0;pointer-events:none;transition:opacity 0.25s}
.modal-overlay.abierto{opacity:1;pointer-events:auto}
.modal{background:white;border-radius:14px;padding:18px;width:100%;max-width:380px;max-height:85vh;overflow-y:auto;transform:scale(0.92);transition:transform 0.25s}
.modal-overlay.abierto .modal{transform:scale(1)}
.modal-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px}
.modal-titulo{font-size:15px;font-weight:500;color:#0C2E54}
.modal-cerrar{color:#5A8AC0;font-size:22px;line-height:1;background:none;border:none;padding:4px}
.modal label{display:block;font-size:10px;color:#1E4A7A;letter-spacing:0.4px;font-weight:500;margin-bottom:4px;margin-top:10px}
.modal label:first-of-type{margin-top:0}
.modal-actions{display:flex;gap:8px;margin-top:16px}
.modal-actions button{flex:1;padding:11px;border-radius:8px;font-size:13px;font-weight:500;border:1px solid transparent}
.btn-save{background:#0C2E54;color:white}
.btn-cancel{background:white;color:#0C2E54;border-color:#C9DDF2}
.btn-delete{background:white;color:#791F1F;border-color:#F09595}
.btn-toggle{background:white;color:#0C2E54;border-color:#C9DDF2;padding:10px;border-radius:8px;font-size:12px;font-weight:500}
.btn-toggle.activo{background:#1D9E75;color:white;border-color:#1D9E75}
.btn-toggle.fav.activo{background:#EF9F27;color:white;border-color:#EF9F27}

/* MENUS - CALENDARIO */
.cal-header{display:grid;grid-template-columns:repeat(7,1fr);gap:2px;margin-bottom:6px}
.cal-header p{font-size:9px;color:#1E4A7A;text-align:center;letter-spacing:0.3px;font-weight:500}
.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
.cal-day{aspect-ratio:1;background:#F4F8FC;border-radius:6px;padding:3px;display:flex;flex-direction:column;cursor:pointer;border:1.5px solid transparent;min-height:40px}
.cal-day.otro-mes{opacity:0.4}
.cal-day.hoy{border-color:#85B7EB}
.cal-day.activo{background:#DCEAF8;border-color:#0C2E54}
.cal-day .num{font-size:10px;color:#1E4A7A;font-weight:500}
.cal-day.activo .num{color:#0C2E54}
.cal-day .puntos{display:flex;gap:2px;margin-top:2px;flex-wrap:wrap}
.cal-day .punto{width:5px;height:5px;border-radius:50%}
.cal-leyenda{margin-top:10px;padding-top:10px;border-top:1px solid #EAF2FB;display:flex;justify-content:center;gap:14px;flex-wrap:wrap}
.cal-leyenda span{display:inline-flex;align-items:center;gap:4px;font-size:10px}
.cal-leyenda .punto{width:7px;height:7px;border-radius:50%}

.menu-card{border-radius:10px;padding:10px 12px;border-left:3px solid;display:flex;justify-content:space-between;align-items:flex-start;gap:8px;cursor:pointer;margin-bottom:8px}
.menu-card.desayuno{background:#FAEEDA;border-color:#EF9F27}
.menu-card.almuerzo{background:#E1F5EE;border-color:#1D9E75}
.menu-card.cena{background:#EEEDFE;border-color:#7F77DD}
.menu-card .tipo-pill{font-size:9px;padding:2px 7px;border-radius:999px;font-weight:500;letter-spacing:0.3px}
.menu-card.desayuno .tipo-pill{background:#FAC775;color:#633806}
.menu-card.almuerzo .tipo-pill{background:#5DCAA5;color:#04342C}
.menu-card.cena .tipo-pill{background:#AFA9EC;color:#26215C}
.menu-card .nombre{font-size:13px;font-weight:500;line-height:1.3;margin-top:4px}
.menu-card.desayuno .nombre{color:#412402}
.menu-card.almuerzo .nombre{color:#04342C}
.menu-card.cena .nombre{color:#26215C}
.menu-card .lado{display:flex;flex-direction:column;align-items:flex-end;gap:3px}
.menu-card .estrella{font-size:14px;color:#BA7517;line-height:1}
.menu-card .estrella.vacia{color:#C9DDF2}
.menu-card .estado{font-size:8px;padding:1px 5px;border-radius:999px}
.menu-card .estado.preparada{background:#1D9E75;color:white}
.menu-card .estado.pendiente{background:#DCEAF8;color:#1E4A7A}
.menu-card .video-tag{font-size:9px;color:#534AB7;margin-top:3px}

.video-preview{margin-top:10px;border-radius:8px;overflow:hidden;border:1px solid #C9DDF2;background:#F4F8FC}
.video-preview img{width:100%;display:block}
.video-preview .info{padding:8px 10px;font-size:11px;color:#1E4A7A}

/* CONTEXT MENU */
.ctx-menu{position:fixed;background:white;border-radius:10px;border:1px solid #C9DDF2;box-shadow:0 4px 14px rgba(12,46,84,0.15);padding:6px;z-index:300;min-width:140px}
.ctx-menu button{width:100%;text-align:left;padding:9px 12px;border-radius:6px;font-size:13px;color:#0C2E54}
.ctx-menu button:hover,.ctx-menu button:active{background:#DCEAF8}
.ctx-menu button.peligro{color:#791F1F}

/* SEMANTIC */
.tarjeta-total{background:#0C2E54;color:white;padding:14px;border-radius:14px;margin-bottom:12px}
.tarjeta-total p:first-child{font-size:10px;color:#B5D4F4;letter-spacing:0.4px}
.tarjeta-total p:nth-child(2){font-size:24px;font-weight:500;margin-top:4px}
.tarjeta-total p:last-child{font-size:11px;color:#85B7EB;margin-top:6px}

.progress-bar{height:6px;background:#EAF2FB;border-radius:3px;overflow:hidden;margin-bottom:6px}
.progress-fill{height:100%;background:#1D9E75;border-radius:3px;transition:width 0.4s}
.progress-fill.alerta{background:#D85A30}
.progress-fill.peligro{background:#A32D2D}
.progress-text{font-size:10px;color:#5A8AC0;text-align:right}

.toast{position:fixed;bottom:80px;left:50%;transform:translateX(-50%);background:#0C2E54;color:white;padding:10px 18px;border-radius:999px;font-size:13px;z-index:400;opacity:0;transition:opacity 0.3s;pointer-events:none}
.toast.visible{opacity:1}
</style>
</head>
<body>

<div id="splash">
  <svg viewBox="0 0 140 110" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet">
    <path d="M 30 38 L 14 52 L 14 90 Q 14 96 20 96 L 56 96 Q 62 96 62 90 L 62 52 Z" fill="#EAF2FB"/>
    <rect x="32" y="68" width="12" height="28" fill="#0C2E54"/>
    <circle cx="38" cy="82" r="1.5" fill="#EAF2FB"/>
    <text x="92" y="68" text-anchor="middle" font-family="Georgia,serif" font-size="56" font-weight="700" fill="#EAF2FB" dominant-baseline="middle">C</text>
    <text x="118" y="68" text-anchor="middle" font-family="Georgia,serif" font-size="56" font-weight="700" fill="#85B7EB" dominant-baseline="middle">S</text>
    <line x1="76" y1="50" x2="76" y2="86" stroke="#85B7EB" stroke-width="1.5" stroke-linecap="round" opacity="0.6"/>
  </svg>
  <h1>Hogar<span class="plus">+</span></h1>
  <p class="iniciales">CARLOS · STEFANY</p>
  <p class="frase" id="frase-dia">Cargando...</p>
</div>

<div id="login" class="hidden">
  <p class="titulo">¿Quién eres?</p>
  <p class="subtitulo">Selecciona tu usuario e ingresa tu PIN</p>
  <div class="usuarios" id="usuarios-lista"></div>
  <div class="pin-display" id="pin-display"></div>
  <div class="pin-pad" id="pin-pad"></div>
  <p class="pin-error" id="pin-error"></p>
</div>

<div id="app">
  <div id="vista-contenedor"></div>
</div>

<div class="bottom-nav hidden" id="bottom-nav">
  <div class="nav-item activo" data-vista="gastos">
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg></div>
    <span>Gastos</span>
  </div>
  <div class="nav-item" data-vista="mercado">
    <div class="icon"><svg viewBox="0 0 24 24"><circle cx="9" cy="21" r="1"/><circle cx="20" cy="21" r="1"/><path d="M1 1h4l2.7 13.4a2 2 0 002 1.6h9.7a2 2 0 002-1.6L23 6H6"/></svg></div>
    <span>Mercado</span>
  </div>
  <div class="nav-item" data-vista="menus">
    <div class="icon"><svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg></div>
    <span>Menús</span>
  </div>
  <div class="nav-item" id="logout-btn">
    <div class="icon"><svg viewBox="0 0 24 24"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg></div>
    <span>Salir</span>
  </div>
</div>

<div id="modal-overlay" class="modal-overlay" onclick="if(event.target===this)cerrarModal()">
  <div class="modal" id="modal-contenido"></div>
</div>

<div id="ctx-menu" class="ctx-menu hidden"></div>
<div id="toast" class="toast"></div>

<script>
// Carga robusta de Supabase con múltiples CDNs como fallback
(function loadSupabase() {
  const cdns = [
    'https://unpkg.com/@supabase/supabase-js@2/dist/umd/supabase.js',
    'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js',
    'https://esm.sh/@supabase/supabase-js@2'
  ];
  let i = 0;
  function tryNext() {
    if (i >= cdns.length) {
      document.body.innerHTML = '<div style="padding:40px;text-align:center;color:#0C2E54;font-family:sans-serif"><h2>No se pudo conectar</h2><p>Tu navegador o red está bloqueando la carga. Prueba desactivar la prevención de rastreo (Edge: Settings → Privacy → Tracking prevention → Off para este sitio) o usa Chrome.</p></div>';
      return;
    }
    const s = document.createElement('script');
    s.src = cdns[i++];
    s.onerror = tryNext;
    s.onload = function() {
      if (typeof supabase === 'undefined' && typeof window.supabase === 'undefined') {
        tryNext();
      } else {
        const sf = document.createElement('script');
        sf.src = 'frases.js';
        sf.onload = function() {
          const sa = document.createElement('script');
          sa.src = 'app.js';
          document.body.appendChild(sa);
        };
        document.body.appendChild(sf);
      }
    };
    document.head.appendChild(s);
  }
  tryNext();
})();
</script>
